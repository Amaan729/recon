<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailSuite Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1729;
      color: #fff;
      padding: 0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(37,99,235,0.25) 0%, rgba(15,23,41,0) 100%);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }

    /* Status pill */
    .status-bar {
      margin: 14px 18px 0;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
    }

    .status-bar.connected {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.2);
      color: #4ade80;
    }

    .status-bar.disconnected {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.15);
      color: rgba(255,120,120,0.8);
    }

    .status-bar.empty {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.35);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.green { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .dot.red   { background: #f87171; }
    .dot.grey  { background: rgba(255,255,255,0.2); }

    /* Form */
    .form {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: rgba(96,165,250,0.5);
      background: rgba(255,255,255,0.07);
    }

    .field input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .saved-msg {
      text-align: center;
      font-size: 11px;
      color: #4ade80;
      height: 14px;
      transition: opacity 0.3s;
    }

    /* Footer links */
    .footer {
      padding: 0 18px 16px;
      display: flex;
      gap: 8px;
    }

    .footer a {
      flex: 1;
      display: block;
      text-align: center;
      padding: 7px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 11px;
      transition: all 0.15s;
    }

    .footer a:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
    }

    hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 0 18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✉</div>
    <div class="header-text">
      <h1>MailSuite Tracker</h1>
      <p>Gmail open tracking — invisible, instant</p>
    </div>
  </div>

  <div id="statusBar" class="status-bar empty">
    <span class="dot grey" id="statusDot"></span>
    <span id="statusText">Enter your API key to activate tracking</span>
  </div>

  <div class="form">
    <div class="field">
      <label>API Key</label>
      <input type="text" id="apiKey" placeholder="Paste from Dashboard → Settings" />
    </div>
    <div class="field">
      <label>Dashboard URL</label>
      <input type="text" id="dashboardUrl" placeholder="http://localhost:3001" />
    </div>
    <div id="savedMsg" class="saved-msg"></div>
    <button class="btn btn-primary" id="saveBtn">Save & Activate</button>
  </div>

  <hr />

  <div class="footer">
    <a id="dashboardLink" href="#" target="_blank">Open Dashboard ↗</a>
    <a id="gmailLink" href="https://mail.google.com" target="_blank">Open Gmail ↗</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
